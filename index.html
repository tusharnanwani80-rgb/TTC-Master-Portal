<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTC Master Admin Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rust: #D94F2B; --rust-dark: #b83e20; --rust-light: #f7ede8;
      --cream: #FDF6EE; --ink: #1e1510; --muted: #8a7060; --border: #e2d4ca;
      --blue: #4361EE; --green: #059669; --orange: #FF6B35;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background-color: var(--cream); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; position: relative; overflow-x: hidden; }
    body::before, body::after { content: ''; position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
    body::before { width: 500px; height: 500px; background: radial-gradient(circle, rgba(217,79,43,0.08) 0%, transparent 70%); top: -100px; right: -100px; }
    body::after { width: 400px; height: 400px; background: radial-gradient(circle, rgba(217,79,43,0.06) 0%, transparent 70%); bottom: -80px; left: -80px; }
    .card { background: #fff; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 2px 6px rgba(30,21,16,0.06), 0 12px 40px rgba(30,21,16,0.10); width: 100%; max-width: 640px; padding: 36px; position: relative; z-index: 1; animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .portal-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .logo-wrap { width: 56px; height: 56px; border-radius: 12px; overflow: hidden; flex-shrink: 0; border: 2px solid var(--rust-light); display: flex; align-items: center; justify-content: center; background: var(--rust-light); }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .header-text h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.55rem; font-weight: 700; color: var(--ink); line-height: 1.2; }
    .header-text .badge { display: inline-block; margin-top: 5px; background: var(--rust-light); color: var(--rust); font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 24px; background: var(--rust-light); padding: 6px; border-radius: 14px; }
    .tab-btn { flex: 1; padding: 10px; font-family: 'DM Sans'; font-size: 14px; font-weight: 600; color: var(--muted); background: transparent; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; }
    .tab-btn.active { background: #fff; color: var(--rust); box-shadow: 0 2px 8px rgba(217,79,43,0.15); }
    .tab-content { display: none; animation: fadeUp 0.3s ease both; }
    .tab-content.active { display: block; }
    label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], select, textarea { width: 100%; padding: 12px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--cream); color: var(--ink); outline: none; transition: 0.2s; margin-bottom: 16px; }
    input[type="text"]:focus, select:focus, textarea:focus { border-color: var(--rust); background: #fff; box-shadow: 0 0 0 3px rgba(217,79,43,0.12); }
    textarea { height: 180px; resize: vertical; font-family: 'Courier New', monospace; font-size: 13px; }
    .section-box { border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 20px; background: #fff; }
    .section-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    .new-entry-box { background: var(--rust-light); border-color: var(--border); }
    .list-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px dashed var(--border); }
    .list-item:last-child { border-bottom: none; padding-bottom: 0; }
    .checkbox-wrapper { display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; flex-shrink: 0; }
    .checkbox-wrapper input { width: 20px; height: 20px; cursor: pointer; accent-color: var(--green); }
    .item-details { flex: 1; }
    .item-subj { font-size: 11px; font-weight: 700; color: var(--rust); text-transform: uppercase; margin-bottom: 2px; }
    .item-task { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.3; }
    .syl-select { width: 110px; padding: 6px 8px; font-size: 12px; margin-bottom: 0; border-radius: 8px; }
    .submit-btn { width: 100%; padding: 14px 20px; background: var(--rust); color: white; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 14px rgba(217,79,43,0.30); }
    .submit-btn:hover:not(:disabled) { background: var(--rust-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(217,79,43,0.38); }
    .submit-btn:disabled { background: #c5b8b2; cursor: not-allowed; box-shadow: none; }
    .status-box { margin-top: 14px; padding: 12px; border-radius: 10px; display: none; font-size: 13.5px; font-weight: 600; text-align: center; animation: fadeUp 0.3s ease both; border: 1px solid transparent; }
    .success { background: #eafaf1; color: #1a6b3a; border-color: #b7e4c7; }
    .error   { background: #fdf0ed; color: #9b2c2c; border-color: #f5c6c6; }
    .loader-text { text-align: center; font-weight: 600; color: var(--muted); padding: 30px; }
    .portal-footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 11.5px; color: #c0aea4; }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #ccc; margin-right: 6px; vertical-align: middle; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.5; background: #ccc; } 50% { opacity: 1; background: #4CAF50; } }
  </style>
</head>
<body>

<div class="card">
  <div class="portal-header">
    <div class="logo-wrap"><img src="https://i.postimg.cc/x9mDND2Q/Ttc-logo.png" alt="TTC"></div>
    <div class="header-text">
      <h2>Teacher Admin</h2>
      <span class="badge">Master Portal</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('json')">📋 JSON Paste</button>
    <button class="tab-btn" onclick="switchTab('hw')">📚 Homework</button>
    <button class="tab-btn" onclick="switchTab('syl')">✅ Syllabus</button>
  </div>

  <div id="tab-json" class="tab-content active">
    <p style="font-size:13px; color:var(--muted); margin-bottom:16px;">Paste the <strong>JSON block</strong> from ChatGPT / Gemini below for bulk updates.</p>
    <label>JSON Data</label>
    <textarea id="jsonInput" placeholder='Paste JSON here... e.g. [{"studentName": "Aarohi", "type": "Test"...}]'></textarea>
    <button class="submit-btn" id="btn-json" onclick="syncJSON()">Update Dashboard 🚀</button>
    <div id="status-json" class="status-box"></div>
  </div>

  <div id="db-loader" class="loader-text" style="display:none;">⏳ Connecting to live database...</div>

  <div id="student-selector" style="display:none;">
    <label>Select Student</label>
    <select id="globalStudent" onchange="loadStudentData()">
      <option value="">-- Choose a Student --</option>
    </select>
  </div>

  <div id="tab-hw" class="tab-content">
    <div id="hw-workspace" style="display:none;">
      <div class="section-box new-entry-box">
        <div class="section-title" style="color:var(--rust);">➕ Assign New Homework</div>
        <div style="display:flex; gap:10px;">
          <div style="flex:1;"><label>Subject</label><input type="text" id="newHwSubj" placeholder="e.g. Maths"></div>
        </div>
        <label>Task Details</label><input type="text" id="newHwTask" placeholder="e.g. Ex 2.1 Q1-5" style="margin-bottom:0;">
      </div>
      <div class="section-box">
        <div class="section-title">📋 Existing Homework <span id="hwCount" style="font-size:11px; background:var(--ink); color:#fff; padding:3px 8px; border-radius:50px;">0</span></div>
        <div id="hwList"></div>
      </div>
      <button class="submit-btn" id="btn-hw" onclick="syncHW()">Sync Homework 🚀</button>
      <div id="status-hw" class="status-box"></div>
    </div>
  </div>

  <div id="tab-syl" class="tab-content">
    <div id="syl-workspace" style="display:none;">
      <div class="section-box new-entry-box">
        <div class="section-title" style="color:var(--rust);">➕ Add New Chapter</div>
        <div style="display:flex; gap:10px;">
          <div style="flex:1;"><label>Subject</label><input type="text" id="newSylSubj" placeholder="e.g. Science"></div>
          <div style="flex:1;">
            <label>Status</label>
            <select id="newSylStatus">
              <option value="Completed">Completed</option>
              <option value="Ongoing">Ongoing</option>
              <option value="Pending">Upcoming</option>
            </select>
          </div>
        </div>
        <label>Chapter Name</label><input type="text" id="newSylChap" placeholder="e.g. Chapter 3: Heat" style="margin-bottom:0;">
      </div>
      <div class="section-box">
        <div class="section-title">📚 Current Syllabus Tracker</div>
        <div id="sylList"></div>
      </div>
      <button class="submit-btn" id="btn-syl" onclick="syncSyllabus()">Sync Syllabus 🚀</button>
      <div id="status-syl" class="status-box"></div>
    </div>
  </div>

  <div class="portal-footer">
    <span><span class="dot"></span>Connected to Google Sheets</span>
    <span>Tushar Tuition Classes</span>
  </div>
</div>

<script>
  // 🔴 PASTE YOUR WEB APP URL HERE 🔴
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxQiwdMGjaY2ZcGE0iaAbwC72CPjgRp2WhHKyj1mjF5vHd_2wzKjofdEMoeHisz2i-Xsg/exec';

  let ALL_STUDENTS = {};
  let originalHWState = {}; 
  let originalSylState = {};
  let isDbLoaded = false;

  function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-' + tabId).classList.add('active');

    if (tabId === 'hw' || tabId === 'syl') {
      if (!isDbLoaded) fetchDatabase();
      else document.getElementById('student-selector').style.display = 'block';
    } else {
      document.getElementById('student-selector').style.display = 'none';
    }
  }

  async function fetchDatabase() {
    document.getElementById('db-loader').style.display = 'block';
    try {
      const res = await fetch(WEB_APP_URL);
      const json = await res.json();
      if (json.status !== 'ok') throw new Error(json.msg);
      
      ALL_STUDENTS = json.data;
      const select = document.getElementById('globalStudent');
      select.innerHTML = '<option value="">-- Choose a Student --</option>'; 
      
      Object.keys(ALL_STUDENTS).sort((a, b) => ALL_STUDENTS[a].name.localeCompare(ALL_STUDENTS[b].name))
        .forEach(id => {
          let opt = document.createElement('option'); opt.value = id;
          opt.innerText = ALL_STUDENTS[id].name + " (" + ALL_STUDENTS[id].class + ")";
          select.appendChild(opt);
        });

      isDbLoaded = true;
      document.getElementById('db-loader').style.display = 'none';
      document.getElementById('student-selector').style.display = 'block';
    } catch (e) {
      document.getElementById('db-loader').innerHTML = "❌ Failed to connect to sheets. Please check URL.";
    }
  }

  function loadStudentData() {
    const id = document.getElementById('globalStudent').value;
    const hwWork = document.getElementById('hw-workspace');
    const sylWork = document.getElementById('syl-workspace');
    
    document.querySelectorAll('.status-box').forEach(b => b.style.display = 'none');
    document.getElementById('newHwSubj').value = ''; document.getElementById('newHwTask').value = '';
    document.getElementById('newSylSubj').value = ''; document.getElementById('newSylChap').value = '';
    
    if (!id) { hwWork.style.display = 'none'; sylWork.style.display = 'none'; return; }
    
    hwWork.style.display = 'block';
    sylWork.style.display = 'block';
    const student = ALL_STUDENTS[id];

    let hwHtml = '';
    const hwArray = student.previousHomework || [];
    document.getElementById('hwCount').innerText = hwArray.length;
    originalHWState = {};

    if (hwArray.length === 0) hwHtml = '<div style="color:var(--muted); font-size:13px; text-align:center; padding:10px;">No homework history found.</div>';
    else {
      hwArray.forEach((hw, idx) => {
        const uniqueKey = hw.subject + "|||" + (hw.originalTopic || hw.task);
        originalHWState[uniqueKey] = hw.done;
        hwHtml += `
          <div class="list-item">
            <div class="checkbox-wrapper"><input type="checkbox" id="hw_${idx}" data-key="${uniqueKey}" data-subj="${hw.subject}" data-task="${hw.originalTopic || hw.task}" ${hw.done ? 'checked' : ''}></div>
            <div class="item-details"><div class="item-subj">${hw.subject}</div><label for="hw_${idx}" class="item-task" style="margin:0;cursor:pointer;text-transform:none;">${hw.task}</label></div>
          </div>`;
      });
    }
    document.getElementById('hwList').innerHTML = hwHtml;

    let sylHtml = '';
    originalSylState = {};
    if (Object.keys(student.syllabus || {}).length === 0) sylHtml = '<div style="color:var(--muted); font-size:13px; text-align:center; padding:10px;">No syllabus history found.</div>';
    else {
      for (let subj in student.syllabus) {
        let cleanSubj = subj.replace(/[^\x00-\x7F]/g, '').trim(); 
        sylHtml += `<div style="font-size:12px; font-weight:700; color:var(--ink); background:var(--cream); padding:6px 10px; border-radius:6px; margin-top:10px;">${cleanSubj}</div>`;
        
        const data = student.syllabus[subj];
        const allChaps = [
           ...((data.completed||[]).map(c => ({name: c, status: 'Completed'}))),
           ...((data.ongoing||[]).map(c => ({name: c, status: 'Ongoing'}))),
           ...((data.pending||[]).map(c => ({name: c, status: 'Pending'})))
        ];
        
        allChaps.forEach(chap => {
          let uniqueKey = cleanSubj + '|||' + chap.name;
          originalSylState[uniqueKey] = chap.status;
          sylHtml += `
          <div class="list-item" style="padding-left:10px;">
            <div class="item-details"><div class="item-task">${chap.name}</div></div>
            <select class="syl-select" data-key="${uniqueKey}" data-subj="${cleanSubj}" data-chap="${chap.name}">
              <option value="Completed" ${chap.status==='Completed'?'selected':''}>Completed</option>
              <option value="Ongoing" ${chap.status==='Ongoing'?'selected':''}>Ongoing</option>
              <option value="Pending" ${chap.status==='Pending'?'selected':''}>Upcoming</option>
            </select>
          </div>`;
        });
      }
    }
    document.getElementById('sylList').innerHTML = sylHtml;
  }

  async function sendPayload(payloadArray, btnId, statusId) {
    const btn = document.getElementById(btnId);
    const statusBox = document.getElementById(statusId);
    if(payloadArray.length === 0) {
      statusBox.className = "status-box error"; statusBox.innerText = "No changes detected to sync."; statusBox.style.display = "block";
      setTimeout(() => statusBox.style.display="none", 3000); return;
    }
    
    btn.disabled = true; let oldText = btn.innerText; btn.innerText = "⏳ Syncing..."; statusBox.style.display = "none";
    try {
      const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payloadArray), headers: { 'Content-Type': 'text/plain;charset=utf-8' }});
      const result = await res.json();
      if (result.status === 'success' || result.status === 'ok') {
        statusBox.className = "status-box success"; statusBox.innerText = `✅ Successfully synced ${payloadArray.length} updates!`;
        setTimeout(() => { fetchDatabase(); document.getElementById('newHwSubj').value=''; document.getElementById('newHwTask').value=''; document.getElementById('newSylChap').value=''; }, 1500);
      } else throw new Error("Server rejected update.");
    } catch (e) { statusBox.className = "status-box error"; statusBox.innerText = "❌ Error: " + e.message; }
    
    statusBox.style.display = "block"; btn.disabled = false; btn.innerText = oldText;
  }

  function syncJSON() {
    try {
      let text = document.getElementById('jsonInput').value.trim();
      let cleanText = text.replace(/```json/g, '').replace(/```/g, '').trim();
      let payload = JSON.parse(cleanText);
      if(!Array.isArray(payload)) payload = [payload];
      sendPayload(payload, 'btn-json', 'status-json');
      document.getElementById('jsonInput').value = '';
    } catch(e) {
      const statusBox = document.getElementById('status-json');
      statusBox.className = "status-box error"; statusBox.innerText = "⚠️ Invalid JSON format."; statusBox.style.display = "block";
    }
  }

  function syncHW() {
    let payload = [];
    const id = document.getElementById('globalStudent').value;
    const sName = ALL_STUDENTS[id].name;

    const newSubj = document.getElementById('newHwSubj').value.trim();
    const newTask = document.getElementById('newHwTask').value.trim();
    // New homework assigned
if (newSubj && newTask) payload.push({ studentId: id, studentName: sName, type: "HW_Assigned", subject: newSubj, topic: newTask });

// Inside the existing homework checkbox loop:
if (box.checked !== originalHWState[key]) {
  payload.push({ studentId: id, studentName: sName, type: "HW_Status", subject: box.getAttribute('data-subj'), topic: box.getAttribute('data-task'), status: box.checked ? "Done" : "Pending" });
}
    });
    sendPayload(payload, 'btn-hw', 'status-hw');
  }

  function syncSyllabus() {
    let payload = [];
    const id = document.getElementById('globalStudent').value;
    const sName = ALL_STUDENTS[id].name;

    const newSubj = document.getElementById('newSylSubj').value.trim();
    const newChap = document.getElementById('newSylChap').value.trim();
    const newStat = document.getElementById('newSylStatus').value;
   // New chapter added
if (newSubj && newChap) payload.push({ studentId: id, studentName: sName, type: "Syllabus", subject: newSubj, topic: newChap, status: newStat });

// Inside the syllabus select loop:
if (sel.value !== originalSylState[key]) {
  payload.push({ studentId: id, studentName: sName, type: "Syllabus", subject: sel.getAttribute('data-subj'), topic: sel.getAttribute('data-chap'), status: sel.value });
}
    });
    sendPayload(payload, 'btn-syl', 'status-syl');
  }
</script>
</body>
</html>
